# PyTorchJob with MIG GPU - Kueue Managed
#
# This PyTorchJob runs distributed training with:
#   - Master: 1g.5gb MIG slice (5GB)
#   - Workers: 3g.20gb MIG slices (20GB each)
#
# The DAS webhook transforms all replica specs automatically.
#
# Prerequisites:
#   - Kubeflow Training Operator installed
#   - Kueue with DAS integration enabled
#
# Usage:
#   kubectl apply -f 02-pytorchjob.yaml

apiVersion: kubeflow.org/v1
kind: PyTorchJob
metadata:
  name: pytorch-distributed-training
  labels:
    # This label tells Kueue to manage this PyTorchJob
    kueue.x-k8s.io/queue-name: das-local-queue
spec:
  pytorchReplicaSpecs:
    Master:
      replicas: 1
      restartPolicy: OnFailure
      template:
        spec:
          containers:
          - name: pytorch
            image: pytorch/pytorch:2.0.0-cuda11.7-cudnn8-runtime
            command:
            - python
            - -c
            - |
              import torch
              import torch.distributed as dist
              print(f"PyTorch version: {torch.__version__}")
              print(f"CUDA available: {torch.cuda.is_available()}")
              if torch.cuda.is_available():
                  print(f"GPU: {torch.cuda.get_device_name(0)}")
                  print(f"Memory: {torch.cuda.get_device_properties(0).total_memory / 1e9:.2f} GB")
            resources:
              limits:
                # Master uses smaller MIG slice
                nvidia.com/mig-1g.5gb: "1"
                cpu: "2"
                memory: "4Gi"
              requests:
                nvidia.com/mig-1g.5gb: "1"
                cpu: "1"
                memory: "2Gi"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault

    Worker:
      replicas: 2
      restartPolicy: OnFailure
      template:
        spec:
          containers:
          - name: pytorch
            image: pytorch/pytorch:2.0.0-cuda11.7-cudnn8-runtime
            command:
            - python
            - -c
            - |
              import torch
              import torch.distributed as dist
              print(f"Worker - PyTorch version: {torch.__version__}")
              print(f"CUDA available: {torch.cuda.is_available()}")
              if torch.cuda.is_available():
                  print(f"GPU: {torch.cuda.get_device_name(0)}")
            resources:
              limits:
                # Workers use larger MIG slices for compute
                nvidia.com/mig-3g.20gb: "1"
                cpu: "4"
                memory: "8Gi"
              requests:
                nvidia.com/mig-3g.20gb: "1"
                cpu: "2"
                memory: "4Gi"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
