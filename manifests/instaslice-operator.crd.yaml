---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: dasoperators.inference.redhat.com
spec:
  group: inference.redhat.com
  names:
    kind: DASOperator
    listKind: DASOperatorList
    plural: dasoperators
    singular: dasoperator
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: DASOperator is the Schema for the DASOperator API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec holds user settable values for configuration
            properties:
              logLevel:
                default: Normal
                description: |-
                  logLevel is an intent based logging for an overall component.  It does not give fine grained control, but it is a
                  simple way to manage coarse grained logging choices that operators have to interpret for their operands.

                  Valid values are: "Normal", "Debug", "Trace", "TraceAll".
                  Defaults to "Normal".
                enum:
                - ""
                - Normal
                - Debug
                - Trace
                - TraceAll
                type: string
              managementState:
                description: managementState indicates whether and how the operator
                  should manage the component
                pattern: ^(Managed|Unmanaged|Force|Removed)$
                type: string
              nodeSelector:
                additionalProperties:
                  type: string
                description: NodeSelector allows additional node label filters for
                  the daemonset pods
                type: object
              observedConfig:
                description: |-
                  observedConfig holds a sparse config that controller has observed from the cluster state.  It exists in spec because
                  it is an input to the level for the operator
                nullable: true
                type: object
                x-kubernetes-preserve-unknown-fields: true
              operatorLogLevel:
                default: Normal
                description: |-
                  operatorLogLevel is an intent based logging for the operator itself.  It does not give fine grained control, but it is a
                  simple way to manage coarse grained logging choices that operators have to interpret for themselves.

                  Valid values are: "Normal", "Debug", "Trace", "TraceAll".
                  Defaults to "Normal".
                enum:
                - ""
                - Normal
                - Debug
                - Trace
                - TraceAll
                type: string
              tlsSecurityProfile:
                description: |-
                  tlsSecurityProfile specifies the TLS security profile for the operator's
                  HTTPS endpoints (webhooks, metrics). If not set, the cluster-wide
                  APIServer TLS profile is used. If that is also not set, the Intermediate
                  profile is used as default.
                properties:
                  custom:
                    description: |-
                      custom is a user-defined TLS security profile. Be extremely careful using a custom
                      profile as invalid configurations can be catastrophic. An example custom profile
                      looks like this:

                        ciphers:

                          - ECDHE-ECDSA-CHACHA20-POLY1305

                          - ECDHE-RSA-CHACHA20-POLY1305

                          - ECDHE-RSA-AES128-GCM-SHA256

                          - ECDHE-ECDSA-AES128-GCM-SHA256

                        minTLSVersion: VersionTLS11
                    nullable: true
                    properties:
                      ciphers:
                        description: |-
                          ciphers is used to specify the cipher algorithms that are negotiated
                          during the TLS handshake.  Operators may remove entries their operands
                          do not support.  For example, to use DES-CBC3-SHA  (yaml):

                            ciphers:
                              - DES-CBC3-SHA
                        items:
                          type: string
                        type: array
                        x-kubernetes-list-type: atomic
                      minTLSVersion:
                        description: |-
                          minTLSVersion is used to specify the minimal version of the TLS protocol
                          that is negotiated during the TLS handshake. For example, to use TLS
                          versions 1.1, 1.2 and 1.3 (yaml):

                            minTLSVersion: VersionTLS11

                          NOTE: currently the highest minTLSVersion allowed is VersionTLS12
                        enum:
                        - VersionTLS10
                        - VersionTLS11
                        - VersionTLS12
                        - VersionTLS13
                        type: string
                    type: object
                  intermediate:
                    description: |-
                      intermediate is a TLS security profile based on:

                      https://wiki.mozilla.org/Security/Server_Side_TLS#Intermediate_compatibility_.28recommended.29

                      and looks like this (yaml):

                        ciphers:

                          - TLS_AES_128_GCM_SHA256

                          - TLS_AES_256_GCM_SHA384

                          - TLS_CHACHA20_POLY1305_SHA256

                          - ECDHE-ECDSA-AES128-GCM-SHA256

                          - ECDHE-RSA-AES128-GCM-SHA256

                          - ECDHE-ECDSA-AES256-GCM-SHA384

                          - ECDHE-RSA-AES256-GCM-SHA384

                          - ECDHE-ECDSA-CHACHA20-POLY1305

                          - ECDHE-RSA-CHACHA20-POLY1305

                          - DHE-RSA-AES128-GCM-SHA256

                          - DHE-RSA-AES256-GCM-SHA384

                        minTLSVersion: VersionTLS12
                    nullable: true
                    type: object
                  modern:
                    description: |-
                      modern is a TLS security profile based on:

                      https://wiki.mozilla.org/Security/Server_Side_TLS#Modern_compatibility

                      and looks like this (yaml):

                        ciphers:

                          - TLS_AES_128_GCM_SHA256

                          - TLS_AES_256_GCM_SHA384

                          - TLS_CHACHA20_POLY1305_SHA256

                        minTLSVersion: VersionTLS13
                    nullable: true
                    type: object
                  old:
                    description: |-
                      old is a TLS security profile based on:

                      https://wiki.mozilla.org/Security/Server_Side_TLS#Old_backward_compatibility

                      and looks like this (yaml):

                        ciphers:

                          - TLS_AES_128_GCM_SHA256

                          - TLS_AES_256_GCM_SHA384

                          - TLS_CHACHA20_POLY1305_SHA256

                          - ECDHE-ECDSA-AES128-GCM-SHA256

                          - ECDHE-RSA-AES128-GCM-SHA256

                          - ECDHE-ECDSA-AES256-GCM-SHA384

                          - ECDHE-RSA-AES256-GCM-SHA384

                          - ECDHE-ECDSA-CHACHA20-POLY1305

                          - ECDHE-RSA-CHACHA20-POLY1305

                          - DHE-RSA-AES128-GCM-SHA256

                          - DHE-RSA-AES256-GCM-SHA384

                          - DHE-RSA-CHACHA20-POLY1305

                          - ECDHE-ECDSA-AES128-SHA256

                          - ECDHE-RSA-AES128-SHA256

                          - ECDHE-ECDSA-AES128-SHA

                          - ECDHE-RSA-AES128-SHA

                          - ECDHE-ECDSA-AES256-SHA384

                          - ECDHE-RSA-AES256-SHA384

                          - ECDHE-ECDSA-AES256-SHA

                          - ECDHE-RSA-AES256-SHA

                          - DHE-RSA-AES128-SHA256

                          - DHE-RSA-AES256-SHA256

                          - AES128-GCM-SHA256

                          - AES256-GCM-SHA384

                          - AES128-SHA256

                          - AES256-SHA256

                          - AES128-SHA

                          - AES256-SHA

                          - DES-CBC3-SHA

                        minTLSVersion: VersionTLS10
                    nullable: true
                    type: object
                  type:
                    description: |-
                      type is one of Old, Intermediate, Modern or Custom. Custom provides
                      the ability to specify individual TLS security profile parameters.
                      Old, Intermediate and Modern are TLS security profiles based on:

                      https://wiki.mozilla.org/Security/Server_Side_TLS#Recommended_configurations

                      The profiles are intent based, so they may change over time as new ciphers are developed and existing ciphers
                      are found to be insecure.  Depending on precisely which ciphers are available to a process, the list may be
                      reduced.

                      Note that the Modern profile is currently not supported because it is not
                      yet well adopted by common software libraries.
                    enum:
                    - Old
                    - Intermediate
                    - Modern
                    - Custom
                    type: string
                type: object
              unsupportedConfigOverrides:
                description: |-
                  unsupportedConfigOverrides overrides the final configuration that was computed by the operator.
                  Red Hat does not support the use of this field.
                  Misuse of this field could lead to unexpected behavior or conflict with other configuration options.
                  Seek guidance from the Red Hat support before using this field.
                  Use of this property blocks cluster upgrades, it must be removed before upgrading your cluster.
                nullable: true
                type: object
                x-kubernetes-preserve-unknown-fields: true
            type: object
          status:
            description: status holds observed values from the cluster. They may not
              be overridden.
            properties:
              conditions:
                description: conditions is a list of conditions and their status
                items:
                  description: OperatorCondition is just the standard condition fields.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      type: string
                    reason:
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              generations:
                description: generations are used to determine when an item needs
                  to be reconciled or has changed in a way that needs a reaction.
                items:
                  description: GenerationStatus keeps track of the generation for
                    a given resource so that decisions about forced updates can be
                    made.
                  properties:
                    group:
                      description: group is the group of the thing you're tracking
                      type: string
                    hash:
                      description: hash is an optional field set for resources without
                        generation that are content sensitive like secrets and configmaps
                      type: string
                    lastGeneration:
                      description: lastGeneration is the last generation of the workload
                        controller involved
                      format: int64
                      type: integer
                    name:
                      description: name is the name of the thing you're tracking
                      type: string
                    namespace:
                      description: namespace is where the thing you're tracking is
                      type: string
                    resource:
                      description: resource is the resource type of the thing you're
                        tracking
                      type: string
                  required:
                  - group
                  - name
                  - namespace
                  - resource
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - group
                - resource
                - namespace
                - name
                x-kubernetes-list-type: map
              latestAvailableRevision:
                description: latestAvailableRevision is the deploymentID of the most
                  recent deployment
                format: int32
                type: integer
                x-kubernetes-validations:
                - message: must only increase
                  rule: self >= oldSelf
              observedGeneration:
                description: observedGeneration is the last generation change you've
                  dealt with
                format: int64
                type: integer
              readyReplicas:
                description: readyReplicas indicates how many replicas are ready and
                  at the desired state
                format: int32
                type: integer
              version:
                description: version is the level this availability applies to
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
