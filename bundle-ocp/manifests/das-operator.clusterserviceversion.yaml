  description: |-
    ### Introduction
    Dynamic Accelerator Slicer uses stable APIs and works with the NVIDIA GPU Operator to create MIG slices on demand.

    ### Why Dynamic Accelerator Slicer

    Partitionable accelerators provided by vendors need partition to be created at node boot-time or to change partitions one would have to evict all the workloads at the node level to create new set of partitions.

    Dynamic Accelerator Slicer will help if:

    - user does not know all the accelerators partitions needed a priori on every node on the cluster
    - user partition requirements change at the workload level rather than the node level
    - user does not want to learn or use new API to request accelerators slices
    - user prefers to use stable device plugins APIs for creating partitions

    ### Features
    - Integration with vLLM, Kserve, [Deployments](https://github.com/openshift/instaslice-operator/blob/main/samples/vllm_deployment.yaml), [Jobs](https://github.com/openshift/instaslice-operator/blob/main/samples/vllm_job.yaml), and [Statefulsets](https://github.com/openshift/instaslice-operator/blob/main/samples/vllm_statefulset.yaml)

    ### Prerequisites

    1. Install the cert-manager Operator for Red Hat OpenShift.
    2. Install the Node Feature Discovery (NFD) Operator and create a NodeFeatureDiscovery custom resource so GPU labels are present on the cluster nodes.
    3. Install the NVIDIA GPU Operator and configure MIG support as described in the product documentation. At a minimum:
       - Apply a ClusterPolicy that enables MIG mode and disables the default NVIDIA device plugin on nodes where you plan to create slices.
       - Enable MIG on each GPU (verify with `nvidia-smi` and ensure the MIG column reports `Enabled`).
       - Confirm the GPU Operator is healthy: `oc get clusterpolicies.nvidia.com -o jsonpath='{.items[0].status.state}'`.

    Refer to the OpenShift documentation for the full workflow: https://docs.redhat.com/en/documentation/openshift_container_platform/4.19/html/hardware_accelerators/das-about-dynamic-accelerator-slicer-operator#das-operator-installing-web-console_das-about-dynamic-accelerator-slicer-operator.

    ### API Backward Compatibility
    **NOTE:** Until Operator supports **seamless upgrades**, a new version of the operator may introduce a change that is **NOT** backwards compatible with the previous version. Thus, to upgrade the operator, uninstall the already installed version completely (including CRDs) and install the new version.

    For example to upgrade from 0.1.0 to 0.2.0, you must uninstall `0.1.0` by following [uninstall operator section](https://github.com/openshift/instaslice-operator) and install the new version.

    Changes to patch version (major.minor.patch) indicates that no breaking changes are introduced, thus upgrade can be done without uninstalling and reinstalling the operator.

    ### Documentation
    Documentation and installation guide can be found below:
      * [Dynamic Accelerator Slicer Operator](https://docs.redhat.com/en/documentation/openshift_container_platform/4.19/html/hardware_accelerators/das-about-dynamic-accelerator-slicer-operator#das-operator-installing-web-console_das-about-dynamic-accelerator-slicer-operator)

    ### License
    das-operator is licensed under the Apache 2.0 license
