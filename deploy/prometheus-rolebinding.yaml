apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: prometheus-metrics-access-binding
  namespace: instaslice-system
subjects:
  - kind: ServiceAccount
    name: prometheus  # This is the service account Prometheus uses
    namespace: default  # the namespace where Prometheus is running
roleRef:
  kind: Role
  name: prometheus-metrics-access
  apiGroup: rbac.authorization.k8s.io
