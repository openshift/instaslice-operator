apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: prometheus-metrics-access
  namespace: instaslice-system
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get"]
  - apiGroups: ["extensions", "apps"]
    resources: ["deployments"]
    verbs: ["get"]
