apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  annotations:
    cert-manager.io/inject-ca-from: CERTIFICATE_NAMESPACE/CERTIFICATE_NAME
  labels:
    app.kubernetes.io/component: webhook
    app.kubernetes.io/created-by: das-operator
    app.kubernetes.io/instance: mutating-webhook-configuration
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: mutatingwebhookconfiguration
    app.kubernetes.io/part-of: das-operator
  name: das-mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: das-operator-webhook
      namespace: das-operator
      path: /mutate-pod
      port: 8443
  failurePolicy: Fail
  name: pod.instaslice.redhat.com
  namespaceSelector:
    matchExpressions:
    - key: kubernetes.io/metadata.name
      operator: NotIn
      values:
      - das-operator
      - kube-system
  rules:
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - CREATE
    resources:
    - pods
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: das-operator-webhook
      namespace: das-operator
      path: /mutate-job
      port: 8443
  failurePolicy: Ignore
  name: job.das.redhat.com
  namespaceSelector:
    matchExpressions:
    - key: kueue.openshift.io/managed
      operator: In
      values:
      - "true"
    - key: kubernetes.io/metadata.name
      operator: NotIn
      values:
      - das-operator
      - kube-system
  rules:
  - apiGroups:
    - batch
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - jobs
  sideEffects: None
